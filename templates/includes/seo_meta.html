<title>{{ page_title }} | {{ site_name }}</title>
<meta name="keywords" content="Tour activities, itineraries, Tour holidays, Kerala holidays, Blue Lagoon Holidays">
<meta name="description" content="{{ page_description|default:'' }}">
{% if canonical_url %}<link rel="canonical" href="{{ canonical_url }}">{% endif %}
<meta property="og:title" content="{{ page_title }} | {{ site_name }}">
<meta property="og:description" content="{{ page_description|default:'' }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ canonical_url }}">
<meta property="og:site_name" content="{{ site_name }}">
{% if og_image %}<meta property="og:image" content="{{ og_image }}">{% endif %}
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page_title }} | {{ site_name }}">
<meta name="twitter:description" content="{{ page_description|default:'' }}">
