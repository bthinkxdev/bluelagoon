<nav class="wl-package-tabs" id="wl-package-tabs" aria-label="Package categories" role="tablist" data-package-filter-tabs>
  <button type="button" role="tab" class="wl-package-tabs__item{% if not category_type %} is-active{% endif %}" data-package-filter data-category="" aria-selected="{% if not category_type %}true{% else %}false{% endif %}" id="wl-package-tab-all">
    All
  </button>
  <button type="button" role="tab" class="wl-package-tabs__item{% if category_type == 'domestic' %} is-active{% endif %}" data-package-filter data-category="domestic" aria-selected="{% if category_type == 'domestic' %}true{% else %}false{% endif %}" id="wl-package-tab-domestic">
    Domestic
  </button>
  <button type="button" role="tab" class="wl-package-tabs__item{% if category_type == 'international' %} is-active{% endif %}" data-package-filter data-category="international" aria-selected="{% if category_type == 'international' %}true{% else %}false{% endif %}" id="wl-package-tab-international">
    International
  </button>
  <button type="button" role="tab" class="wl-package-tabs__item{% if category_type == 'pilgrim' %} is-active{% endif %}" data-package-filter data-category="pilgrim" aria-selected="{% if category_type == 'pilgrim' %}true{% else %}false{% endif %}" id="wl-package-tab-pilgrim">
    Pilgrimage
  </button>
</nav>
