<div class="wl-search-empty-enquiry wl-reveal" id="wl-search-enquiry">
  <div class="wl-empty wl-empty--enquiry wl-empty--enquiry-simple">
    <h3>Enter your details</h3>
    <p>We will reach out to you soon.</p>
  </div>

  {% if messages %}
  <div class="wl-contact-alerts">
    {% for message in messages %}
    <div class="wl-alert wl-alert--{% if message.tags == 'error' %}error{% else %}success{% endif %}" role="alert">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="wl-detail-block wl-detail-block--enquiry">
    <form method="post" action="{{ request.path }}{% if request.GET %}?{{ request.GET.urlencode }}{% endif %}#wl-search-enquiry" class="wl-form wl-contact-form wl-enquiry-form" novalidate>
      {% csrf_token %}
      <input type="hidden" name="enquiry_source" value="package_search">
      {{ enquiry_form.package_slug }}
      {% include "enquiries/includes/contact_form_fields.html" with form=enquiry_form %}
    </form>
  </div>
</div>
