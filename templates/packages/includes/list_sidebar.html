{% load package_tags %}
{% if show_help_card != False %}
<div class="wl-sidebar-card wl-sidebar-card--help">
  <div class="wl-sidebar-card__icon" aria-hidden="true">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 11v2a2 2 0 0 0 2 2h1v3.5a1 1 0 0 0 1.6.8L12 17h4a2 2 0 0 0 2-2v-1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </div>
  <h3>Need help?</h3>
  <p>Our travel experts are here for you.</p>
  <a href="tel:{{ site_settings.phone_primary|phone_tel }}" class="wl-sidebar-card__phone">{{ site_settings.phone_primary }}</a>
  <a href="tel:{{ site_settings.phone_primary|phone_tel }}" class="wl-btn wl-btn--call wl-btn--block wl-sidebar-card__call">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L15 13l5 2v4a2 2 0 0 1-2 2A15 15 0 0 1 3 6a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    Call now
  </a>
  <small>Mon – Fri : 9:00 AM – 7:30 PM</small>
</div>
{% endif %}

<div class="wl-sidebar-card wl-sidebar-card--benefits">
  <ul class="wl-sidebar-benefits">
    <li>
      <span class="wl-sidebar-benefits__icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.9 6.1L21 9.2l-4.5 4.3 1.1 6.4L12 17.8 6.4 20l1.1-6.4L3 9.2l6.1-1.1L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </span>
      Best Price Guarantee
    </li>
    <li>
      <span class="wl-sidebar-benefits__icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      Expert Support
    </li>
    <li>
      <span class="wl-sidebar-benefits__icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2"/></svg>
      </span>
      Secure Booking
    </li>
    <li>
      <span class="wl-sidebar-benefits__icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/></svg>
      </span>
      Customizable Trips
    </li>
  </ul>
</div>
