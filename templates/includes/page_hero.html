{% load static %}
<section class="wl-page-hero{% if hero_modifier %} wl-page-hero--{{ hero_modifier }}{% endif %}"
  {% if hero_image %}style="--wl-page-hero-image: url('{{ hero_image }}');"{% endif %}
  aria-labelledby="wl-page-hero-title">
  <div class="wl-page-hero__overlay" aria-hidden="true"></div>
  <div class="container wl-page-hero__inner">
    <div class="wl-page-hero__content wl-reveal">
      {% if hero_eyebrow %}<p class="wl-page-hero__eyebrow">{{ hero_eyebrow }}</p>{% endif %}
      <h1 class="wl-page-hero__title" id="wl-page-hero-title">{{ title }}</h1>
      {% if subtitle %}<p class="wl-page-hero__lead">{{ subtitle }}</p>{% endif %}
    </div>
  </div>
</section>
